<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portfolio</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            color: #333;
            min-height: 100vh;
        }
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        nav li {
            display: inline;
        }
        nav a {
            display: inline-block;
            color: #333;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            border-radius: 20px;
            margin: 5px;
        }
        nav a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #333;
            text-align: center;
            padding: 80px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            margin: 0;
            font-size: 3em;
            font-weight: 300;
        }
        header p {
            font-size: 1.2em;
            margin: 10px 0 0 0;
        }
        section {
            padding: 50px;
            max-width: 900px;
            margin: 0 auto;
        }
        .about, .projects, .contact {
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .about:hover, .contact:hover {
            transform: translateY(-5px);
        }
        .projects {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 300;
        }
        .about img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            float: right;
            margin-left: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .project {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            width: 48%;
        }
        .project:hover {
            transform: translateY(-5px);
        }
        .project img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #333;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <header>
        <h1>Your Name</h1>
        <p>Web Developer</p>
    </header>
    
    <nav>
        <ul>
            <li><a href="portfolio.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
    <section style="padding: 50px; max-width: 900px; margin: 0 auto; text-align: center;">
        <h2>Welcome to My Portfolio</h2>
        <p style="font-size: 1.1em;">Hi! I'm a passionate web developer creating beautiful and functional websites. Explore my work and get to know me better.</p>
        <p>
            <a href="about.html" style="display: inline-block; margin: 10px; padding: 12px 24px; background: rgba(100, 150, 200, 0.5); color: #333; text-decoration: none; border-radius: 20px; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(100, 150, 200, 0.8)'" onmouseout="this.style.background='rgba(100, 150, 200, 0.5)'">Learn About Me</a>
            <a href="projects.html" style="display: inline-block; margin: 10px; padding: 12px 24px; background: rgba(100, 150, 200, 0.5); color: #333; text-decoration: none; border-radius: 20px; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(100, 150, 200, 0.8)'" onmouseout="this.style.background='rgba(100, 150, 200, 0.5)'">View Projects</a>
            <a href="contact.html" style="display: inline-block; margin: 10px; padding: 12px 24px; background: rgba(100, 150, 200, 0.5); color: #333; text-decoration: none; border-radius: 20px; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(100, 150, 200, 0.8)'" onmouseout="this.style.background='rgba(100, 150, 200, 0.5)'">Contact Me</a>
        </p>
    </section>
    
    <footer>
        <p>&copy; 2023 Your Name. All rights reserved.</p>
    </footer>
</body>
</html>
